name: Android APK Build
on:
  push:
    branches:
      - main
    paths:
      - app/build.gradle.kts
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制完整构建并发布（跳过版本检查）'
        required: false
        default: 'true'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version info
        id: get_version
        run: |
          VERSION_CODE=$(grep -A 10 "defaultConfig" app/build.gradle.kts | grep "versionCode" | sed 's/.*versionCode = \(.*\)/\1/')
          VERSION_NAME=$(grep -A 10 "defaultConfig" app/build.gradle.kts | grep "versionName" | sed 's/.*versionName = "\(.*\)".*/\1/')
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Check if version changed
        id: check_version
        run: |
          FORCE_BUILD="${{ github.event.inputs.force_build }}"

          # 手动触发且 force_build=true：直接打包，跳过版本检查
          if [ "$FORCE_BUILD" = "true" ]; then
            echo "手动触发强制打包，跳过版本检查"
            echo "VERSION_CHANGED=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 自动触发：检查上一个commit中的版本号
          git checkout HEAD~1 -- app/build.gradle.kts
          OLD_VERSION_CODE=$(grep -A 10 "defaultConfig" app/build.gradle.kts | grep "versionCode" | sed 's/.*versionCode = \(.*\)/\1/')
          OLD_VERSION_NAME=$(grep -A 10 "defaultConfig" app/build.gradle.kts | grep "versionName" | sed 's/.*versionName = "\(.*\)".*/\1/')

          # 恢复当前版本的build.gradle.kts
          git checkout HEAD -- app/build.gradle.kts

          echo "Old version: $OLD_VERSION_NAME (code: $OLD_VERSION_CODE)"
          echo "New version: ${{ steps.get_version.outputs.VERSION_NAME }} (code: ${{ steps.get_version.outputs.VERSION_CODE }})"

          if [ "$OLD_VERSION_CODE" != "${{ steps.get_version.outputs.VERSION_CODE }}" ]; then
            echo "Version changed! Building release..."
            echo "VERSION_CHANGED=true" >> $GITHUB_OUTPUT
          else
            echo "Version code unchanged. Skipping release build."
            echo "VERSION_CHANGED=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK
        if: steps.check_version.outputs.VERSION_CHANGED == 'true'
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/app/keystore.jks"
          printf '%s' "$KEYSTORE_FILE" | base64 -d > "$KEYSTORE_PATH"
          ./gradlew assembleReleaseRenamed \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload Release APK
        if: steps.check_version.outputs.VERSION_CHANGED == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: MyBili-v${{ steps.get_version.outputs.VERSION_NAME }}-release
          path: app/build/outputs/renamed_apk/release/MyBili-v${{ steps.get_version.outputs.VERSION_NAME }}-release.apk

      - name: Extract changelog
        if: steps.check_version.outputs.VERSION_CHANGED == 'true'
        id: changelog
        run: |
          VERSION="v${{ steps.get_version.outputs.VERSION_NAME }}"
          # 提取该版本的更新内容（从 ## v1.2.0 到下一个 ## 之间的内容）
          CHANGELOG=$(sed -n "/^## ${VERSION}/,/^## /{ /^## ${VERSION}/d; /^## /q; p; }" CHANGELOG.md)
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check_version.outputs.VERSION_CHANGED == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.VERSION_NAME }}"
          # 若已存在同名 release/tag，先删除（强覆盖），不存在则忽略
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          # 将 changelog 写入临时文件，避免 shell 对换行/特殊字符的处理
          printf '%s\n' "${{ steps.changelog.outputs.CHANGELOG }}" > release_notes.txt
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release_notes.txt \
            app/build/outputs/renamed_apk/release/MyBili-v${{ steps.get_version.outputs.VERSION_NAME }}-release.apk
